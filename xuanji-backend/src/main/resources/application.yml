spring:
  profiles:
    active: dev
  devtools:
    restart:
      enabled: false

server:
  port: 8080
  servlet:
    context-path: /xuanji-backend

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: info
    com.xuanji: debug
